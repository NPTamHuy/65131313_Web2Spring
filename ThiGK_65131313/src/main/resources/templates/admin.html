<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin">⚙️ Admin Panel</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin}">Quản lý tin tức</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}">Quản lý chuyên mục</a></li>
                </ul>
                <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container bg-white p-4 rounded shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-primary fw-bold">📋 Danh Sách Tin Tức</h3>
            <a th:href="@{/admin/add}" class="btn btn-primary fw-bold">+ Viết bài mới</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover border">
                <thead class="table-light">
                    <tr>
                        <th>Ảnh</th>
                        <th>Tiêu đề</th>
                        <th>Chuyên mục</th>
                        <th>Ngày đăng</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tin : ${danhSachTin}">
                        <td><img th:src="${tin.image}" style="width: 60px; height: 40px; object-fit: cover;" class="rounded border"></td>
                        <td th:text="${tin.title}" class="fw-bold"></td>
                        <td><span class="badge bg-secondary" th:text="${tin.loaiTinTuc?.tenLoai}"></span></td>
                        <td th:text="${tin.ngayDang}"></td>
                        <td>
                            <a th:href="@{/admin/edit/{id}(id=${tin.idTin})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/admin/delete/{id}(id=${tin.idTin})}" class="btn btn-sm btn-danger" onclick="return confirm('Xóa bài viết này?');">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
