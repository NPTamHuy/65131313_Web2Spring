<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">📰 Trang Tin Tức</a>
            <div class="d-flex">
                <a th:href="@{/login}" class="btn btn-outline-light">Đăng nhập Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card shadow-sm sticky-top" style="top: 20px;">
                    <div class="card-header bg-primary text-white fw-bold">📁 Chuyên Mục</div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/}" class="list-group-item list-group-item-action">Tất cả bài viết</a>
                        <a th:each="loai : ${danhSachLoai}" 
                           th:href="@{/loai/{id}(id=${loai.idLoai})}" 
                           class="list-group-item list-group-item-action" 
                           th:text="${loai.tenLoai}"></a>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="row row-cols-1 row-cols-md-2 g-4">
                    <div class="col" th:each="tin : ${danhSachTin}">
                        <div class="card h-100 shadow-sm">
                            <img th:src="${tin.image != null && !tin.image.isEmpty() ? tin.image : 'https://via.placeholder.com/400x250'}" 
                                 class="card-img-top" style="height: 180px; object-fit: cover;">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title text-dark fw-bold" th:text="${tin.title}"></h5>
                                <p class="card-text text-muted small mb-3">
                                    📅 <span th:text="${tin.ngayDang}"></span><br>
                                    🏷️ <span th:text="${tin.loaiTinTuc?.tenLoai ?: 'Chưa phân loại'}" class="badge bg-secondary"></span>
                                </p>
                                <a th:href="@{/tin-tuc/{id}(id=${tin.idTin})}" class="btn btn-outline-primary mt-auto btn-sm">Đọc tiếp &rarr;</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
