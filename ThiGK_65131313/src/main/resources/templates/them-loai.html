<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm Chuyên Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-success text-white">Thêm Chuyên Mục Mới</div>
                <div class="card-body">
                    <form th:action="@{/admin/categories/save}" th:object="${loaiTin}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên chuyên mục</label>
                            <input type="text" class="form-control" th:field="*{tenLoai}" required>
                        </div>
                        <div class="text-end">
                            <a th:href="@{/admin/categories}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-primary">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
