<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tin.title}">Chi tiết tin tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa; /* Màu nền nền nã hơn */
            font-family: Georgia, "Times New Roman", Times, serif; /* Phông chữ đọc tin chuyên nghiệp */
        }
        .navbar-brand {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 700;
        }
        .main-content {
            background-color: white;
            padding: 3rem; /* Tăng padding để nội dung thông thoáng */
            border-radius: 12px; /* Bo góc khung nội dung */
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); /* Bóng đổ rất nhẹ */
            margin-bottom: 3rem;
        }
        .article-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #212529;
            margin-bottom: 1rem;
        }
        .article-meta {
            font-family: system-ui, -apple-system, sans-serif;
            color: #6c757d;
            font-size: 0.95rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .article-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #333;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary" th:href="@{/}">📰 Thời Báo Online</a>
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">Quay lại</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="main-content">
                    <h1 class="article-title" th:text="${tin.title}">Tiêu đề bài viết</h1>
                    
                    <div class="article-meta">
                        📅 Đăng ngày: <span th:text="${tin.ngayDang}" class="fw-bold text-dark"></span> 
                        <span class="mx-2">|</span> 
                        🏷️ Chuyên mục: <span th:text="${tin.loaiTinTuc?.tenLoai ?: 'Chung'}" class="badge bg-light text-dark border"></span>
                    </div>

                    <div class="article-content" th:text="${tin.content}">
                        Nội dung chi tiết bài viết sẽ hiển thị ở đây...
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
