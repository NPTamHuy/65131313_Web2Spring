<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5; /* Màu nền xám nhạt tinh tế hơn */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .login-container {
            background-color: white;
            padding: 2.5rem; /* Tăng padding một chút */
            border-radius: 16px; /* Bo góc mềm mại hơn */
            /* Bóng đổ mượt mà và sang trọng hơn */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .form-control {
            border-radius: 8px; /* Bo góc input */
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); /* Hiệu ứng focus nhẹ */
        }
        .btn-primary {
            border-radius: 8px; /* Bo góc nút */
            padding: 0.75rem;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            transform: translateY(-1px); /* Hiệu ứng hover nhẹ */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 class="text-center mb-4 fw-bold text-dark">Hệ thống Admin</h2>
        
        <div th:if="${error}" class="alert alert-danger border-0 small p-2 text-center" role="alert">
            Tài khoản hoặc mật khẩu không đúng.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Tên đăng nhập</label>
                <input name="username" type="text" class="form-control" placeholder="Nhập tài khoản" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Mật khẩu</label>
                <input name="password" type="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập ngay</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none small text-muted">← Quay về trang chủ</a>
        </div>
    </div>
</body>
</html>
