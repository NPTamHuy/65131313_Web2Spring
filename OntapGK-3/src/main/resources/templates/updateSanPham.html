<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="card shadow-sm mx-auto border-0 overflow-hidden" style="max-width: 500px; border-radius: 15px;">
            <div class="card-header bg-warning py-3 text-center fw-bold">
                CẬP NHẬT THÔNG TIN SẢN PHẨM
            </div>
            <div class="card-body p-4 bg-white">
                <form th:action="@{/admin/save}" th:object="${sanpham}" method="post">
                    <input type="hidden" th:field="*{idSanPham}">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Tên sản phẩm</label>
                        <input type="text" th:field="*{tenSpham}" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Giá tiền (VNĐ)</label>
                        <input type="text" th:field="*{gia}" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Loại sản phẩm</label>
                        <select th:field="*{loaiSanPham.id_loai}" class="form-select">
                            <option th:each="l : ${dsLoaiSP}" th:value="${l.id_loai}" th:text="${l.ten_loai}"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mô tả chi tiết</label>
                        <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Lưu thay đổi</button>
                        <a href="/admin" class="btn btn-light py-2">Hủy bỏ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
