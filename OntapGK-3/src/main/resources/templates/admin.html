<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #1a1d20; color: white; position: fixed; }
        .sidebar a { color: #8a8d90; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #2c3034; color: white; border-left: 4px solid #0d6efd; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar shadow">
                <div class="p-4 text-center border-bottom border-secondary mb-3">
                    <h5 class="fw-bold m-0">ADMIN CP</h5>
                </div>
                <a href="/home">🏠 Quay về Store</a>
                <a href="/admin" class="active">📦 Sản phẩm</a>
            </div>

            <div class="col-md-10 offset-md-2 p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">Quản lý kho hàng</h2>
                    <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addSPModal">+ Thêm Sản phẩm</button>
                </div>

                <div class="row">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">ID</th>
                                        <th>Sản phẩm</th>
                                        <th>Giá</th>
                                        <th>Phân loại</th>
                                        <th class="text-end pe-3">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="sp : ${dsSanPham}">
                                        <td class="ps-3" th:text="${sp.idSanPham}"></td>
                                        <td class="fw-bold" th:text="${sp.tenSpham}"></td>
                                        <td class="text-danger" th:text="${sp.gia}"></td>
                                        <td><span class="badge bg-secondary" th:text="${sp.loaiSanPham.ten_loai}"></span></td>
                                        <td class="text-end pe-3">
                                            <a th:href="@{'/admin/edit/' + ${sp.idSanPham}}" class="btn btn-sm btn-outline-warning">Sửa</a>
                                            <a th:href="@{'/admin/delete/' + ${sp.idSanPham}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa sản phẩm?')">Xóa</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm p-4 mb-4">
                            <h6 class="fw-bold mb-3">Thêm loại mới</h6>
                            <form th:action="@{/admin/loai/save}" method="post">
                                <input type="text" name="ten_loai" class="form-control mb-2" placeholder="Tên loại..." required>
                                <button type="submit" class="btn btn-success w-100">Lưu loại</button>
                            </form>
                        </div>
                        <div class="card border-0 shadow-sm p-4">
                            <h6 class="fw-bold mb-3 text-muted">Phân loại hiện có:</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="l : ${dsLoaiSanPham}" class="badge bg-light text-dark border p-2 d-flex align-items-center">
                                    <span th:text="${l.ten_loai}"></span>
                                    <a th:href="@{'/admin/loai/delete/' + ${l.id_loai}}" class="text-danger ms-2" style="text-decoration: none;">&times;</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addSPModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form th:action="@{/admin/save}" method="post" class="modal-content border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Sản Phẩm Mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên sản phẩm</label>
                        <input type="text" name="tenSpham" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Giá tiền</label>
                        <input type="text" name="gia" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Loại sản phẩm</label>
                        <select name="loaiSanPham.id_loai" class="form-select">
                            <option th:each="l : ${dsLoaiSanPham}" th:value="${l.id_loai}" th:text="${l.ten_loai}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer bg-light text-end">
                    <button type="submit" class="btn btn-primary px-5">Lưu ngay</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
