<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/home">Trang chủ</a></li>
                <li class="breadcrumb-item active" th:text="${page.tenSpham}"></li>
            </ol>
        </nav>
        <div class="card shadow-lg border-0 overflow-hidden" style="max-width: 800px; margin: auto; border-radius: 20px;">
            <div class="row g-0">
                <div class="col-md-5 bg-dark d-flex align-items-center justify-content-center text-white">
                    <h2 class="text-center p-4">PRODUCT IMAGE</h2>
                </div>
                <div class="col-md-7 p-5 bg-white">
                    <span class="badge bg-info text-dark mb-2 px-3" th:text="${page.loaiSanPham.ten_loai}"></span>
                    <h1 class="fw-bold mb-3" th:text="${page.tenSpham}"></h1>
                    <h3 class="text-danger fw-bold mb-4" th:text="${page.gia + ' VNĐ'}"></h3>
                    <h6 class="fw-bold text-uppercase small text-muted border-bottom pb-2">Mô tả sản phẩm</h6>
                    <p class="text-secondary mt-2" th:text="${page.description}"></p>
                    <div class="mt-5">
                        <a href="/home" class="btn btn-outline-secondary px-4">Quay lại</a>
                        <button class="btn btn-primary px-4 ms-2">Mua ngay</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
