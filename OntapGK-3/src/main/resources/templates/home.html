<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cửa hàng - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: white; border-right: 1px solid #eee; }
        .product-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar shadow-sm position-fixed">
                <div class="p-4 border-bottom">
                    <h4 class="fw-bold text-primary m-0">MY STORE</h4>
                </div>
                <div class="list-group list-group-flush p-3">
                    <a href="/home" class="list-group-item list-group-item-action active rounded border-0 mb-2">🏠 Trang chủ</a>
                    <a href="/admin" class="list-group-item list-group-item-action rounded border-0">⚙️ Quản trị viên</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10 offset-md-3 offset-lg-2 p-5">
                <div class="mb-5">
                    <h2 class="fw-bold">Khám phá sản phẩm</h2>
                    <p class="text-muted">Danh sách các mặt hàng mới nhất hiện có</p>
                </div>
                
                <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
                    <div class="col" th:each="sp : ${dsSanPham}">
                        <div class="card h-100 product-card">
                            <div class="card-body">
                                <span class="badge bg-primary-subtle text-primary mb-2" th:text="${sp.loaiSanPham.ten_loai}"></span>
                                <h5 class="card-title fw-bold" th:text="${sp.tenSpham}"></h5>
                                <p class="card-text text-muted small" th:text="${sp.description}"></p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="text-danger fw-bold fs-5" th:text="${sp.gia + ' VNĐ'}"></span>
                                    <a th:href="@{'/home/' + ${sp.idSanPham}}" class="btn btn-dark btn-sm">Xem chi tiết</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
