<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm Chuyên Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">📁 Thêm Chuyên Mục Mới</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/categories/save}" th:object="${loaiTin}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên chuyên mục</label>
                            <input type="text" class="form-control" th:field="*{tenLoai}" 
                                   placeholder="Ví dụ: Thể thao, Xã hội..." required>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/loai-tin}" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
