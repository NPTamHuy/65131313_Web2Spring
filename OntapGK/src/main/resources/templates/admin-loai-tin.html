<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Chuyên Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin">⚙️ Admin Panel</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Quản lý tin tức</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/categories}">Quản lý chuyên mục</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container bg-white p-4 rounded shadow-sm">
        <div class="d-flex justify-content-between mb-3">
            <h3 class="text-success fw-bold">📂 Danh Sách Chuyên Mục</h3>
            <a th:href="@{/admin/categories/add}" class="btn btn-success fw-bold">+ Thêm loại tin</a>
        </div>
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên Chuyên Mục</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="loai : ${danhSachLoai}">
                    <td th:text="${loai.idLoai}"></td>
                    <td th:text="${loai.tenLoai}"></td>
                    <td>
                        <a th:href="@{/admin/categories/delete/{id}(id=${loai.idLoai})}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Xóa loại tin này sẽ ảnh hưởng đến các bài viết thuộc loại này. Tiếp tục?');">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
