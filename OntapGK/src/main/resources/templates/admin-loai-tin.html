<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Chuyên Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4 bg-white p-4 rounded shadow-sm">
        <div class="d-flex justify-content-between mb-3">
            <h3>📂 Danh Sách Chuyên Mục</h3>
            <div>
                <a th:href="@{/admin}" class="btn btn-secondary btn-sm">Quản lý tin tức</a>
                <a th:href="@{/admin/loai-tin/add}" class="btn btn-success btn-sm">+ Thêm loại tin</a>
            </div>
        </div>
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên Chuyên Mục</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="loai : ${danhSachLoai}">
                    <td th:text="${loai.idLoai}"></td>
                    <td th:text="${loai.tenLoai}"></td>
                    <td>
                        <a th:href="@{/admin/loai-tin/delete/{id}(id=${loai.idLoai})}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Xóa loại tin này có thể mất các bài viết liên quan. Bạn chắc chứ?')">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
